name: Run Tests
on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ libeigen3-dev libboost-all-dev

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
