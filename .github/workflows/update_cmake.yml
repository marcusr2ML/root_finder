name: Update CMake for New Solver
on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cmake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Check for headers missing a test file
        id: check
        run: |
          missing=""
          for f in include/*.hpp; do
            name=$(basename "$f" .hpp)
            lower=$(echo "$name" | tr '[:upper:]' '[:lower:]')
            if ! grep -q "tests/test_${lower}.cpp" CMakeLists.txt; then
              missing="${missing}${name} "
            fi
          done
          echo "missing=${missing}" >> "$GITHUB_OUTPUT"

      - name: Update CMakeLists via Claude
        if: steps.check.outputs.missing != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            These headers in include/ have no matching test file wired
            into CMakeLists.txt: ${{ steps.check.outputs.missing }}

            For each one:
            1. Read the header. List its #include lines that reference an
               external library (not a standard library header).
            2. For each external library found, determine the correct
               find_package(...) call and CMake target name. If that
               find_package call is not already present in CMakeLists.txt,
               add it immediately above the line
               "## INSERT NEW find_package HERE ##".
            3. If the target isn't already listed under
               target_link_libraries(root_finder ...), add it immediately
               above the line "## INSERT NEW LINK LIBRARY HERE ##".
            4. Add "tests/test_<lowercase_header_name>.cpp" to the
               add_executable(root_finder_tests ...) list, immediately
               above the line "## INSERT NEW TEST FILE HERE ##".
            5. If tests/test_<lowercase_header_name>.cpp does not exist
               yet, create it as a placeholder Catch2 file (one
               TEST_CASE that REQUIREs true) so the build succeeds before
               the test-generation workflow fills in real cases.

            Do not modify, reorder, or reformat any other line in
            CMakeLists.txt. Leave all three marker comments in place.
          allowed_tools: "Read,Edit(CMakeLists.txt),Write(tests/**)"
          claude_args: |
            --max-turns 5

      - name: Open PR with CMake changes
        if: steps.check.outputs.missing != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git diff --quiet && exit 0
          branch="cmake-update-${{ github.run_id }}"
          git checkout -b "$branch"
          git add -A
          git commit -m "chore: wire up CMake for ${{ steps.check.outputs.missing }}"
          git push origin "$branch"
          gh pr create --title "Add CMake target(s): ${{ steps.check.outputs.missing }}" \
            --body "Auto-generated by Claude — review the dependency choice before merging, it affects the build for everyone." \
            --base ${{ inputs.ref }} --head "$branch"
