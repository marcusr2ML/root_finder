name: CI Pipeline
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  generate-tests:
    needs: build
    uses: ./.github/workflows/generate_tests.yml
    with:
      ref: ${{ github.ref_name }}
    secrets: inherit

  run-tests:
    needs: generate-tests
    uses: ./.github/workflows/run_tests.yml
    with:
      ref: ${{ github.ref_name }}

  update-cmake:
    needs: run-tests
    uses: ./.github/workflows/update_cmake.yml
    with:
      ref: ${{ github.ref_name }}
    secrets: inherit
