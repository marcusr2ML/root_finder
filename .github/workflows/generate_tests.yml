name: Generate Tests via Claude
on:
  workflow_run:
    workflows: ["C++ Build"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Regenerate tests with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Read tests/problems.md. For every function in src/root_finders/
            tagged with a "@test_against:" comment, generate a Catch2
            TEST_CASE in tests/generated_tests.cpp that calls the function
            using its real signature (matching parameters by name/type),
            with values pulled from the matching problem(s) in problems.md.
            If a function's parameters can't be confidently matched, leave
            a "// TODO: ambiguous signature" comment instead of guessing.
            Overwrite tests/generated_tests.cpp entirely with the result.
          allowed_tools: "Read,Write"
          claude_args: |
            --max-turns 5

      - name: Commit generated tests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tests/generated_tests.cpp
          git diff --staged --quiet || git commit -m "chore: regenerate tests via Claude"
          git push origin HEAD:main
